name: NPM Publish

on:
  workflow_call:
    inputs:
      binding_dir:
        required: true
        type: string
      npm_package_name:
        required: true
        type: string

env:
  DEBUG: napi:*
  # 如果没有的话 napi prepublish 会报错
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Js
        uses: actions/download-artifact@v4
        with:
          name: js
          path: ${{ inputs.binding_dir }}
          merge-multiple: true

      - name: Show js
        shell: bash
        run: |
          ls -l ${{ inputs.binding_dir }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'
          registry-url: 'https://registry.npmjs.org'

      # npm 11.5.1+ supports OIDC
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Build
        run: pnpm --filter ${{ inputs.npm_package_name }} build

      # TODO: 需要修改
      - name: Create Draft Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false

      - name: NPM Publish
        run: pnpm --filter ${{ inputs.npm_package_name }} publish --no-git-checks --force
        env:
          RELEASE_ID: ${{ steps.create_release.outputs.id }}

      - name: Update Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Updating release..."
          gh release edit ${{ github.ref_name }} --draft=false --latest
